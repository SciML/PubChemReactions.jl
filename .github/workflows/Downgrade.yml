name: "Downgrade"

on:
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - "docs/**"
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

jobs:
  downgrade:
    name: "Downgrade"
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "lts"
    secrets: "inherit"
